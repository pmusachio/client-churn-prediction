[project]
name = "Client Churn Prediction"
slug = "client_churn_prediction"
family = "churn"
problem_type = "binary_classification"
business_goal = "Rank customers by churn probability to guide targeted retention campaigns."
primary_metric = "ROC AUC, Average Precision, Recall@k, Lift@k"

[data]
train_file = "data/raw/churn.csv"
target = "Exited"
positive_label = 1
id_columns = ["RowNumber", "CustomerId", "Surname"]
drop_columns = []

[modeling]
# Primary model used in production pipeline
classifier = "gradient_boosting"    # options: logistic_regression | random_forest | gradient_boosting
class_weight = "balanced"
test_size = 0.2
random_state = 42
max_iter = 1000
n_estimators = 200
max_depth = 4
model_file = "models/model.joblib"

# Hyperparameter search (used by the tuning notebook)
[modeling.search]
n_iter = 30
cv_folds = 5
scoring = "roc_auc"

[evaluation]
top_k = [500, 1000, 2000]
